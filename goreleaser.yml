build:
  main: ./main.go
  binary: watchtower
  goos:
    - linux
  goarch:
    - amd64
    - arm
  goarm:
    - 7
  ldflags:
    - -s -w -X github.com/arieffian/watchtower/internal/meta.Version={{.Version}}
archives:
  - name_template: "{{.ProjectName}}_{{.Os}}_{{.Arch}}"
    format: tar.gz
    replacements:
      arm: armv7
      amd64: amd64
      linux: linux
    files:
      - LICENSE.md
